<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片工作站：上传 & 压缩下载</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-4 md:p-8 text-slate-800">
    <div class="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
        
        <div class="p-6 border-b bg-white sticky top-0 z-20">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-black text-slate-800 tracking-tight">⚙️ IMAGE WORKSTATION</h1>
                    <p class="text-xs text-slate-400 mt-1 uppercase font-bold tracking-widest">Upload to Cloud or Compress for Download</p>
                </div>
                <div id="status" class="text-sm font-bold px-4 py-2 rounded-lg transition-all shadow-sm bg-slate-100 text-slate-500">准备就绪</div>
            </div>
            
            <div class="mt-6 p-4 bg-slate-900 rounded-xl flex flex-wrap items-center gap-8 text-white shadow-inner">
                <div class="flex items-center gap-3">
                    <span class="text-xs font-black text-slate-400 uppercase">处理模式:</span>
                    <label class="flex items-center gap-2 cursor-pointer hover:text-blue-400 transition-colors">
                        <input type="radio" name="size-limit" value="raw" checked class="w-4 h-4 accent-blue-500">
                        <span class="text-sm font-bold">原图上传</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer hover:text-blue-400 transition-colors">
                        <input type="radio" name="size-limit" value="1" class="w-4 h-4 accent-blue-500">
                        <span class="text-sm font-bold">压缩至 1MB</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer hover:text-blue-400 transition-colors">
                        <input type="radio" name="size-limit" value="2" class="w-4 h-4 accent-blue-500">
                        <span class="text-sm font-bold">压缩至 2MB</span>
                    </label>
                </div>
            </div>

            <div id="drop-area" class="mt-4 border-2 border-dashed border-slate-200 rounded-xl py-12 text-center cursor-pointer hover:border-blue-500 hover:bg-blue-50/50 transition-all group">
                <p class="text-slate-400 group-hover:text-blue-600 font-medium text-lg">将图片拖入此处开始处理</p>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 text-slate-500 text-[10px] uppercase font-black tracking-widest border-b">
                    <tr>
                        <th class="px-6 py-4 w-40">预览</th>
                        <th class="px-6 py-4">文件信息</th>
                        <th class="px-6 py-4">云端链接 (Cloud URL)</th>
                        <th class="px-6 py-4 w-48 text-right">本地操作</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-slate-100"></tbody>
            </table>
        </div>
        
        <div id="empty-state" class="py-32 text-center">
            <div class="inline-block p-6 bg-slate-50 rounded-full mb-4">
                <span class="text-4xl">📥</span>
            </div>
            <p class="text-slate-400 font-medium">列表空空如也，等待添加图片</p>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const tableBody = document.getElementById('table-body');
        const status = document.getElementById('status');
        const emptyState = document.getElementById('empty-state');

        const API_KEY = '你的_ImgBB_API_KEY'; // 👈 填入你的 Key

        dropArea.onclick = () => fileInput.click();
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            dropArea.addEventListener(name, e => e.preventDefault());
        });
        dropArea.ondrop = (e) => handleFiles(e.dataTransfer.files);
        fileInput.onchange = () => handleFiles(fileInput.files);

        async function handleFiles(files) {
            if (files.length > 0) emptyState.classList.add('hidden');
            const mode = document.querySelector('input[name="size-limit"]:checked').value;

            for (let file of files) {
                const row = createRow(file);
                tableBody.prepend(row);

                try {
                    let finalFile = file;
                    const infoLabel = row.querySelector('.process-info');
                    const downloadBtn = row.querySelector('.download-btn');

                    // 1. 处理压缩/下载逻辑
                    if (mode === 'raw') {
                        infoLabel.innerText = "✨ 原始画质";
                    } else {
                        infoLabel.innerText = "⏳ 正在压缩...";
                        const compressedBlob = await compressImage(file, mode);
                        finalFile = new File([compressedBlob], `compressed_${file.name}`, { type: 'image/jpeg' });
                        infoLabel.innerText = `✅ 已压缩 (${(finalFile.size / 1024 / 1024).toFixed(2)}MB)`;
                        infoLabel.className = "process-info text-[10px] text-green-600 font-bold mt-1";
                    }

                    // 激活下载按钮
                    downloadBtn.onclick = () => downloadFile(finalFile);
                    downloadBtn.disabled = false;
                    downloadBtn.className = "download-btn bg-slate-800 text-white text-xs px-4 py-2 rounded-lg font-bold hover:bg-black transition-all";
                    downloadBtn.innerText = "下载图片";

                    // 2. 上传逻辑
                    status.innerText = "正在同步云端...";
                    status.className = "text-sm font-bold px-4 py-2 rounded-lg bg-blue-500 text-white animate-pulse";
                    
                    const formData = new FormData();
                    formData.append('image', finalFile);

                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        finishRow(row, data.data.url);
                    } else {
                        row.querySelector('.url-input').value = "云端上传受限";
                    }
                } catch (err) {
                    console.error(err);
                }
            }
            status.innerText = "任务完成";
            status.className = "text-sm font-bold px-4 py-2 rounded-lg bg-green-500 text-white";
        }

        async function compressImage(file, targetMB) {
            const targetBytes = targetMB * 1024 * 1024;
            if (file.size <= targetBytes) return file;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const ctx = canvas.getContext('2d');
                        let quality = 0.9;
                        const step = () => {
                            canvas.width = w; canvas.height = h;
                            ctx.drawImage(img, 0, 0, w, h);
                            canvas.toBlob((blob) => {
                                if (blob.size <= targetBytes || quality <= 0.1) resolve(blob);
                                else {
                                    quality -= 0.1;
                                    if (quality < 0.5) { w *= 0.9; h *= 0.9; }
                                    step();
                                }
                            }, 'image/jpeg', quality);
                        };
                        step();
                    };
                };
            });
        }

        function createRow(file) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50 transition-colors group";
            const localUrl = URL.createObjectURL(file);
            tr.innerHTML = `
                <td class="px-6 py-6">
                    <div class="w-32 h-32 flex items-center justify-center bg-slate-100 rounded-xl border-2 border-white shadow-sm overflow-hidden group-hover:scale-105 transition-transform">
                        <img src="${localUrl}" class="max-w-full max-h-full object-contain">
                    </div>
                </td>
                <td class="px-6 py-6">
                    <p class="text-sm font-black text-slate-800 truncate max-w-[150px] mb-1">${file.name}</p>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tight">Size: ${(file.size / 1024 / 1024).toFixed(2)} MB</p>
                    <p class="process-info text-[10px] text-blue-500 font-black mt-2 tracking-tighter italic">WAITING...</p>
                </td>
                <td class="px-6 py-6">
                    <input type="text" readonly value="PENDING..." 
                        class="url-input w-full text-[11px] py-2.5 px-4 border border-slate-200 rounded-xl bg-slate-50 text-slate-400 font-mono focus:outline-none transition-all">
                </td>
                <td class="px-6 py-6 text-right space-y-2">
                    <button onclick="copyRowLink(this)" disabled class="copy-btn block ml-auto bg-slate-100 text-slate-400 text-[10px] px-4 py-2 rounded-lg font-black uppercase transition-all cursor-not-allowed">复制 URL</button>
                    <button disabled class="download-btn block ml-auto bg-slate-100 text-slate-400 text-[10px] px-4 py-2 rounded-lg font-black uppercase transition-all cursor-not-allowed tracking-tighter">处理中</button>
                </td>
            `;
            return tr;
        }

        function finishRow(row, url) {
            const input = row.querySelector('.url-input');
            const btn = row.querySelector('.copy-btn');
            input.value = url;
            input.className = "url-input w-full text-[11px] py-2.5 px-4 border border-blue-200 rounded-xl bg-white text-blue-600 font-bold shadow-sm";
            btn.disabled = false;
            btn.className = "copy-btn block ml-auto bg-blue-600 text-white text-[10px] px-4 py-2 rounded-lg font-black uppercase hover:bg-blue-700 shadow-lg cursor-pointer";
            row.setAttribute('data-url', url);
        }

        function downloadFile(file) {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(file);
            a.download = file.name;
            a.click();
        }

        function copyRowLink(btn) {
            const url = btn.closest('tr').getAttribute('data-url');
            navigator.clipboard.writeText(url).then(() => {
                const old = btn.innerText;
                btn.innerText = "COPIED!";
                btn.className = btn.className.replace('bg-blue-600', 'bg-green-500');
                setTimeout(() => {
                    btn.innerText = old;
                    btn.className = btn.className.replace('bg-green-500', 'bg-blue-600');
                }, 1500);
            });
        }
    </script>
</body>
</html>
