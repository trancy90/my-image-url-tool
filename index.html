<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图片上传清单</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-4 md:p-8">
    <div class="max-w-5xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden">
        
        <div class="p-6 border-b bg-white sticky top-0 z-10">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <h1 class="text-xl font-bold text-gray-800">🖼️ 图片转 URL 清单</h1>
                <div id="status" class="text-sm text-blue-500 font-medium">等待上传...</div>
            </div>
            
            <div id="drop-area" class="mt-4 border-2 border-dashed border-gray-200 rounded-lg py-6 text-center cursor-pointer hover:bg-blue-50 hover:border-blue-300 transition-all">
                <p class="text-gray-500 text-sm">将多张图片拖到此处，或 <span class="text-blue-600 font-bold">点击上传</span></p>
                <input type="file" id="file-input" multiple accept="image/*" class="hidden">
            </div>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead class="bg-gray-50 text-gray-600 text-sm uppercase">
                    <tr>
                        <th class="px-6 py-3 font-semibold border-b w-24">预览</th>
                        <th class="px-6 py-3 font-semibold border-b">文件名</th>
                        <th class="px-6 py-3 font-semibold border-b">图片 URL</th>
                        <th class="px-6 py-3 font-semibold border-b w-28 text-center">操作</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="divide-y divide-gray-100">
                    </tbody>
            </table>
        </div>
        
        <div id="empty-state" class="py-20 text-center text-gray-400">
            暂无图片，请先上传
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const tableBody = document.getElementById('table-body');
        const status = document.getElementById('status');
        const emptyState = document.getElementById('empty-state');

        const API_KEY = 'd3715b8cf377d51e09832eddff1a1a3a'; // 👈 记得换成你的 ImgBB API Key

        dropArea.onclick = () => fileInput.click();
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(name => {
            dropArea.addEventListener(name, e => e.preventDefault());
        });

        dropArea.ondrop = (e) => {
            handleFiles(e.dataTransfer.files);
        };
        fileInput.onchange = () => handleFiles(fileInput.files);

        async function handleFiles(files) {
            if (files.length > 0) emptyState.classList.add('hidden');
            status.innerText = `正在处理 ${files.length} 张图片...`;

            for (let file of files) {
                const row = createRow(file);
                tableBody.prepend(row); // 新上传的排在最前面

                const formData = new FormData();
                formData.append('image', file);

                try {
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        finishRow(row, data.data.url);
                    } else {
                        row.querySelector('.url-input').value = "上传失败: " + data.error.message;
                    }
                } catch (err) {
                    row.querySelector('.url-input').value = "网络错误，请稍后重试";
                }
            }
            status.innerText = "✨ 所有图片处理完成";
        }

        function createRow(file) {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition-colors";
            const localUrl = URL.createObjectURL(file);
            
            tr.innerHTML = `
                <td class="px-6 py-4">
                    <div class="w-32 h-32 flex items-center justify-center bg-gray-50 rounded border overflow-hidden">
                        <img src="${localUrl}" class="max-w-full max-h-full object-contain shadow-sm">
                    </div>
                </td>
                <td class="px-6 py-4 text-xs text-gray-600 truncate max-w-[120px]">
                    ${file.name}
                </td>
                <td class="px-6 py-4">
                    <input type="text" readonly value="上传中..." 
                        class="url-input w-full text-sm py-2 px-3 border rounded bg-gray-50 text-gray-400 focus:outline-none">
                </td>
                <td class="px-6 py-4 text-center">
                    <button onclick="copyRowLink(this)" disabled
                        class="copy-btn bg-gray-300 text-white text-sm px-4 py-2 rounded transition-all cursor-not-allowed">
                        等待
                    </button>
                </td>
            `;
            return tr;
        }

        function finishRow(row, url) {
            const input = row.querySelector('.url-input');
            const btn = row.querySelector('.copy-btn');
            
            input.value = url;
            input.classList.replace('text-gray-400', 'text-blue-600');
            input.classList.replace('bg-gray-50', 'bg-white');
            input.onclick = function() { this.select(); }; // 点击框内文字自动全选
            
            btn.disabled = false;
            btn.innerText = "复制";
            btn.classList.replace('bg-gray-300', 'bg-blue-500');
            btn.classList.replace('cursor-not-allowed', 'hover:bg-blue-600');
            row.setAttribute('data-url', url);
        }

        function copyRowLink(btn) {
            const row = btn.closest('tr');
            const url = row.getAttribute('data-url');
            if(!url) return;
            
            navigator.clipboard.writeText(url).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "成功";
                btn.classList.replace('bg-blue-500', 'bg-green-500');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-500', 'bg-blue-500');
                }, 1500);
            });
        }
    </script>
</body>
</html>
