<body class="bg-slate-50 p-8">
    <div class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-4 text-slate-800">📸 图片转 URL 工具 (带预览)</h1>
        
        <div id="drop-area" class="py-12 text-center rounded-lg cursor-pointer mb-6 bg-slate-50 border-2 border-dashed border-slate-300 hover:border-blue-500 transition-all">
            <p class="text-slate-500 text-lg">将图片拖到这里，或 <span class="text-blue-500 font-semibold">点击上传</span></p>
            <input type="file" id="file-input" multiple accept="image/*" class="hidden">
        </div>

        <div id="status" class="mb-4 text-sm font-medium text-blue-600"></div>

        <div id="result-section" class="space-y-4">
            <h2 class="font-semibold text-slate-700">上传列表：</h2>
            <div id="preview-container" class="grid grid-cols-1 gap-4">
                </div>
        </div>
    </div>

    <script>
        const dropArea = document.getElementById('drop-area');
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const status = document.getElementById('status');

        const API_KEY = 'd3715b8cf377d51e09832eddff1a1a3a'; // 记得填入你的 Key

        dropArea.onclick = () => fileInput.click();
        dropArea.ondragover = (e) => { e.preventDefault(); dropArea.classList.add('bg-blue-50'); };
        dropArea.ondragleave = () => dropArea.classList.remove('bg-blue-50');
        dropArea.ondrop = (e) => {
            e.preventDefault();
            dropArea.classList.remove('bg-blue-50');
            handleFiles(e.dataTransfer.files);
        };

        fileInput.onchange = () => handleFiles(fileInput.files);

        async function handleFiles(files) {
            status.innerText = `正在上传 ${files.length} 张图片...`;
            
            for (let file of files) {
                // 先创建一个待上传的占位卡片
                const card = createPreviewCard(file);
                previewContainer.prepend(card);

                const formData = new FormData();
                formData.append('image', file);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await response.json();
                    
                    if (data.success) {
                        const url = data.data.url;
                        updateCardSuccess(card, url);
                    } else {
                        card.querySelector('.url-text').innerText = '上传失败';
                    }
                } catch (err) {
                    card.querySelector('.url-text').innerText = '网络错误';
                }
            }
            status.innerText = "处理完成！";
        }

        function createPreviewCard(file) {
            const div = document.createElement('div');
            div.className = "flex items-center p-3 border rounded-lg bg-white shadow-sm gap-4 animate-pulse";
            // 使用本地预览图，不需要等上传完就能看到图
            const localUrl = URL.createObjectURL(file);
            
            div.innerHTML = `
                <img src="${localUrl}" class="w-20 h-20 object-cover rounded shadow-sm">
                <div class="flex-1 min-w-0">
                    <p class="text-xs text-slate-400 truncate">${file.name}</p>
                    <div class="flex mt-1 gap-2">
                        <input type="text" class="url-text w-full text-sm p-1 border rounded bg-slate-50" value="正在上传..." readonly>
                        <button onclick="copyThis(this)" class="copy-btn hidden bg-blue-500 text-white px-3 py-1 rounded text-xs hover:bg-blue-600">复制</button>
                    </div>
                </div>
            `;
            return div;
        }

        function updateCardSuccess(card, url) {
            card.classList.remove('animate-pulse');
            const input = card.querySelector('.url-text');
            const btn = card.querySelector('.copy-btn');
            input.value = url;
            btn.classList.remove('hidden');
        }

        function copyThis(btn) {
            const input = btn.previousElementSibling;
            input.select();
            document.execCommand('copy');
            const originalText = btn.innerText;
            btn.innerText = '已复制';
            setTimeout(() => btn.innerText = originalText, 2000);
        }
    </script>
</body>
